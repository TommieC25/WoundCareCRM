// ── STATE ──────────────────────────────────────────────────────────────────
let allProviders = [];
let resolved = [];

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast', 3500);
}
function log(msg) {
  const el = document.getElementById('execLog');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

// ── NAME MATCHING ──────────────────────────────────────────────────────────
function norm(s) { return (s||'').toLowerCase().replace(/[^a-z]/g,''); }

function findProviders(first, last) {
  // Match all providers with this last name (normalized), then filter by first initial or full first name
  const lastN = norm(last);
  const firstN = norm(first);
  const byLast = allProviders.filter(p => norm(p.last_name) === lastN);
  if (!byLast.length) return [];
  if (byLast.length === 1) return byLast;
  // Multiple last-name matches — narrow by first name
  const byBoth = byLast.filter(p => norm(p.first_name).startsWith(firstN) || firstN.startsWith(norm(p.first_name).charAt(0)));
  return byBoth.length ? byBoth : byLast;
}

// ── LOAD & PREVIEW ─────────────────────────────────────────────────────────
async function loadAndPreview() {
  const btn = document.getElementById('previewBtn');
  const status = document.getElementById('previewStatus');
  btn.disabled = true; status.textContent = 'Loading…';

  const { data, error } = await db.from('providers')
    .select('id,first_name,last_name,degree,specialty,general_notes').limit(5000);
  if (error) {
    status.textContent = 'DB error: ' + error.message;
    status.style.color = '#dc2626';
    btn.disabled = false; return;
  }
  allProviders = data || [];

  resolved = DECISIONS.map((d, i) => {
    const matches = findProviders(d.first, d.last);
    return { ...d, idx: i, matches, issue: matches.length === 0 ? 'No match' : matches.length > 1 ? `${matches.length} matches — all will be acted on` : null };
  });

  const delCount  = resolved.filter(r=>r.action==='DELETE'&&r.matches.length>0).length;
  const keepCount = resolved.filter(r=>r.action==='KEEP'&&r.matches.length>0).length;
  const noMatch   = resolved.filter(r=>r.matches.length===0).length;

  document.getElementById('sumDel').textContent  = `${delCount} DELETE`;
  document.getElementById('sumKeep').textContent = `${keepCount} KEEP+note`;
  document.getElementById('sumNoMatch').textContent = `${noMatch} No match`;

  const tbody = document.getElementById('previewBody');
  tbody.innerHTML = resolved.map((r, i) => {
    const badge = r.action==='DELETE'
      ? '<span class="badge badge-del">DELETE</span>'
      : '<span class="badge badge-keep">KEEP</span>';
    const rowClass = r.matches.length===0 ? 'warn-row' : r.action==='DELETE' ? 'delete-row' : 'keep-row';
    const matchText = r.matches.length===0
      ? '⚠ Not found in DB'
      : r.matches.map(p=>`${p.first_name} ${p.last_name} ${p.degree||''} (${p.specialty||'—'})`).join('<br>');
    const notePreview = r.note.substring(0,60) + (r.note.length>60?'…':'');
    return `<tr class="${rowClass}" id="row-${i}">
      <td>${badge}</td>
      <td><strong>${r.first} ${r.last}</strong>${r.issue?`<br><span style="font-size:0.7rem;color:#d97706;">${r.issue}</span>`:''}</td>
      <td style="font-size:0.75rem;">${matchText}</td>
      <td style="font-size:0.72rem;color:#555;font-style:italic;">${r.action==='DELETE'?'—':notePreview}</td>
      <td class="status-col" id="status-${i}" style="font-size:0.75rem;color:#666;">Pending</td>
    </tr>`;
  }).join('');

  status.textContent = `Loaded ${allProviders.length} providers · ${resolved.length} decisions · ${noMatch} unmatched`;
  document.getElementById('previewSection').style.display = 'block';
  btn.disabled = false;
  showToast('Preview ready — review matches then execute', 'success');
}

// ── EXECUTE ────────────────────────────────────────────────────────────────
async function executeAll() {
  const toDelete = resolved.filter(r=>r.action==='DELETE'&&r.matches.length>0);
  const toNote   = resolved.filter(r=>r.action==='KEEP'&&r.matches.length>0);
  const noMatch  = resolved.filter(r=>r.matches.length===0);

  const msg = `Execute ${resolved.length} decisions?\n\n` +
    `DELETE: ${toDelete.length} providers (removes assignments + contact logs)\n` +
    `KEEP+note: ${toNote.length} providers (appends verification note)\n` +
    `Skipped (no DB match): ${noMatch.length}\n\nThis cannot be undone.`;
  if (!confirm(msg)) return;

  const btn = document.getElementById('execBtn');
  btn.disabled = true;
  document.getElementById('logCard').style.display = 'block';
  log('=== Execution started ' + new Date().toLocaleString() + ' ===\n');

  let done=0, skipped=0, errors=0;

  for (const r of resolved) {
    const statusEl = document.getElementById(`status-${r.idx}`);
    const rowEl    = document.getElementById(`row-${r.idx}`);

    if (!r.matches.length) {
      log(`SKIP "${r.first} ${r.last}" — not found in DB`);
      statusEl.textContent = '— not found';
      skipped++;
      continue;
    }

    try {
      if (r.action === 'DELETE') {
        for (const prov of r.matches) {
          log(`DELETE ${prov.first_name} ${prov.last_name} (${prov.id}) — ${r.note.substring(0,60)}`);
          await db.from('provider_location_assignments').delete().eq('provider_id', prov.id);
          await db.from('contact_logs').delete().eq('provider_id', prov.id);
          const { error } = await db.from('providers').delete().eq('id', prov.id);
          if (error) throw error;
          log(`  ✓ Deleted`);
        }
        statusEl.textContent = `✓ Deleted (${r.matches.length})`;
        rowEl.className = 'done-row';
        done++;
      } else {
        for (const prov of r.matches) {
          const existing = prov.general_notes || '';
          const newNote = existing ? existing + '\n' + r.note : r.note;
          const { error } = await db.from('providers').update({ general_notes: newNote }).eq('id', prov.id);
          if (error) throw error;
          log(`KEEP note → ${prov.first_name} ${prov.last_name}: "${r.note.substring(0,70)}"`);
        }
        statusEl.textContent = '✓ Note added';
        rowEl.className = 'done-row';
        done++;
      }
    } catch(e) {
      log(`ERROR on "${r.first} ${r.last}": ${e.message}`);
      statusEl.textContent = '✗ Error';
      rowEl.className = 'error-row';
      errors++;
    }
  }

  log(`\n=== Done: ${done} succeeded, ${skipped} skipped (no match), ${errors} errors ===`);
  btn.disabled = false;
  btn.textContent = `Done (${done}✓ ${skipped}skip ${errors}err)`;
  showToast(`${done} executed, ${skipped} skipped, ${errors} errors`, errors ? 'error' : 'success');
}
