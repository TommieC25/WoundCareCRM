function normalizeAddr(raw) {
  return (raw || '')
    .trim()
    .replace(/\bnan\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/(Suite|Ste\.?|Apt\.?|Unit)\.?\s*#?\s*(\d+)/gi, '#$2')
    .replace(/\b(Southwest|Northwest|Northeast|Southeast|North|South|East|West)\b/gi, m => {
      const d = {southwest:'SW',northwest:'NW',northeast:'NE',southeast:'SE',north:'N',south:'S',east:'E',west:'W'};
      return d[m.toLowerCase()] || m.toUpperCase();
    })
    .replace(/\b(SW|NW|NE|SE)\b/gi, m => m.toUpperCase())
    .replace(/\s+/g, ' ')
    .trim();
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const row = {}; headers.forEach((h, j) => row[h] = vals[j] || '');
    rows.push(row);
  }
  return rows;
}

function log(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

async function runImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Importing…';
  try {
    const rows = parseCSV(CSV_DATA);
    log(`Parsed ${rows.length} rows. Finding/creating practices…`);

    // Phase 1: practices
    const practiceNames = [...new Set(rows.map(r => (r.practice_name || '').trim()).filter(Boolean))];
    const practiceMap = {};
    for (const name of practiceNames) {
      const { data: exArr } = await db.from('practices').select('*').ilike('name', name).limit(1);
      const ex = exArr && exArr.length > 0 ? exArr[0] : null;
      if (ex) { practiceMap[name] = ex.id; }
      else {
        const { data: np } = await db.from('practices').insert({ name }).select().maybeSingle();
        if (np) practiceMap[name] = np.id;
      }
    }
    function getPractId(n) {
      const k = (n || '').trim();
      return practiceMap[k] || practiceMap[Object.keys(practiceMap).find(x => x.toLowerCase() === k.toLowerCase())];
    }

    // Phase 2: locations
    log('Creating practice locations…');
    const locMap = {};
    const seenLocKeys = new Set();
    for (const r of rows) {
      const practId = getPractId(r.practice_name);
      const addr = normalizeAddr(r.address);
      if (!practId || !addr || addr === '[Research needed]') continue;
      const locKey = `${practId}|${addr}`;
      if (seenLocKeys.has(locKey)) continue;
      seenLocKeys.add(locKey);
      const city = (r.city || '').trim();
      const { data: exLoc } = await db.from('practice_locations').select('*').eq('practice_id', practId).eq('address', addr).maybeSingle();
      const locRec = exLoc || (await db.from('practice_locations').insert({
        practice_id: practId, label: city || 'Office', address: addr, city,
        zip: (r.zip || '').trim(), phone: r.phone || null, fax: r.fax || null,
        office_hours: r.office_hours || null, office_staff: r.office_staff || null,
        receptionist_name: r.receptionist_name || null, best_days: r.best_days || null,
        practice_email: r.practice_email || null
      }).select().maybeSingle()).data;
      if (locRec) locMap[locKey] = locRec;
    }

    // Phase 3: build provider map
    const physMap = new Map();
    rows.forEach(r => {
      if (!(r.first_name || '').trim() && !(r.last_name || '').trim()) return;
      const key = `${(r.first_name||'').trim().toLowerCase()}|${(r.last_name||'').trim().toLowerCase()}`;
      if (!physMap.has(key)) physMap.set(key, {
        phys: {
          first_name: (r.first_name||'').trim(), last_name: (r.last_name||'').trim(),
          email: r.email || null, priority: r.priority || null,
          academic_connection: r.academic_connection || r.um_connection || null,
          specialty: r.specialty || null, degree: r.degree || null, title: r.title || null,
          proj_vol: r.proj_vol || r.patient_volume || null,
          ss_vol: r.ss_vol ? parseInt(r.ss_vol, 10) || null : null,
          general_notes: r.general_notes || null,
          is_target: r.is_target === 'Y' || r.is_target === 'y' || r.is_target === 'true' || r.is_target === '1'
        },
        practiceIds: new Set(), primaryLocKey: null
      });
      const e = physMap.get(key);
      const practId = getPractId(r.practice_name);
      if (practId) e.practiceIds.add(practId);
      const addr = normalizeAddr(r.address);
      if (!e.primaryLocKey && practId && addr && addr !== '[Research needed]') e.primaryLocKey = `${practId}|${addr}`;
    });

    // Phase 4: providers + assignments
    let count = 0; const total = physMap.size;
    for (const [, entry] of physMap) {
      count++;
      if (count % 3 === 0 || count === total) log(`Assigning providers ${count} of ${total}…`);
      const { data: exArr } = await db.from('providers').select('*')
        .ilike('first_name', entry.phys.first_name).ilike('last_name', entry.phys.last_name).limit(1);
      const ex = exArr && exArr.length > 0 ? exArr[0] : null;
      const phys = ex || (await db.from('providers').insert(entry.phys).select().maybeSingle()).data;
      if (!phys) continue;
      for (const practId of entry.practiceIds) {
        const { data: allLocs } = await db.from('practice_locations').select('id').eq('practice_id', practId);
        for (const loc of allLocs || []) {
          const isPrimary = entry.primaryLocKey && locMap[entry.primaryLocKey]?.id === loc.id;
          const { data: exA } = await db.from('provider_location_assignments').select('id')
            .eq('provider_id', phys.id).eq('practice_location_id', loc.id).maybeSingle();
          if (!exA) await db.from('provider_location_assignments').insert({ provider_id: phys.id, practice_location_id: loc.id, is_primary: !!isPrimary });
        }
      }
    }

    const msg = `Done! Imported ${physMap.size} providers and ${practiceNames.length} practices.\n\nYou can close this page and hard-refresh the CRM.`;
    log(msg, 'done');
    btn.textContent = 'Import Complete';
  } catch(e) {
    log('Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Retry Import';
  }
}
